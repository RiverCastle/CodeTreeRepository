<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에러 발생 - CodeTree HRM</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .error-container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            color: #ff4757;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: #2f3542;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #57606f;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>!</h1>
        <h2>문제가 발생했습니다.</h2>
        <p>요청하신 페이지를 처리하는 중 에러가 발생했거나,<br>존재하지 않는 페이지입니다.</p>
        <a href="/" class="btn">메인으로 돌아가기</a>
    </div>
</body>
</html>
